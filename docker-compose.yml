services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: peemail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: peemail
      POSTGRES_PASSWORD: peemail
      POSTGRES_DB: peemail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peemail -d peemail"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: peemail-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
